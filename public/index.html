<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peenatars</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #fafafa; color: #111; min-height: 100vh; padding: 60px 40px; max-width: 1100px; margin: 0 auto; }
    .header { margin-bottom: 40px; }
    .header h1 { font-size: 36px; font-weight: 700; display: inline; margin-right: 12px; }
    .badge { display: inline-block; font-size: 12px; padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px; color: #666; text-decoration: none; margin-right: 6px; vertical-align: middle; }
    .badge:hover { border-color: #999; color: #333; }
    .header p { font-size: 18px; color: #666; line-height: 1.6; margin-top: 12px; max-width: 600px; }
    .main { display: flex; gap: 48px; align-items: flex-start; }
    .preview { flex: 0 0 420px; background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 40px; display: flex; flex-direction: column; align-items: center; }
    .preview #avatar { width: 280px; height: 280px; margin-bottom: 30px; }
    .preview #avatar svg { width: 100%; height: 100%; border-radius: 8px; }
    .preview-actions { display: flex; gap: 8px; width: 100%; }
    .btn { flex: 1; font-family: inherit; font-size: 13px; padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #333; cursor: pointer; text-align: center; }
    .btn:hover { border-color: #999; }
    .btn-primary { background: #111; color: #fff; border-color: #111; }
    .btn-primary:hover { background: #333; }
    .controls { flex: 1; display: flex; flex-direction: column; gap: 24px; }
    .control-group label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
    .control-group input[type="text"] { width: 100%; font-family: ui-monospace, monospace; font-size: 15px; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; outline: none; background: #fff; }
    .control-group input[type="text"]:focus { border-color: #111; }
    .seed-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .chip { font-family: ui-monospace, monospace; font-size: 12px; padding: 5px 12px; border: 1px solid #ddd; border-radius: 20px; background: #fff; color: #666; cursor: pointer; }
    .chip:hover { border-color: #111; color: #111; }
    .color-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .color-preset { font-size: 12px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; color: #333; }
    .color-preset:hover { border-color: #111; }
    .color-preset.active { background: #111; color: #fff; border-color: #111; }
    .color-row { display: flex; gap: 12px; }
    .color-input { flex: 1; display: flex; align-items: center; gap: 8px; border: 1px solid #ddd; border-radius: 8px; padding: 8px 12px; background: #fff; }
    .color-swatch { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #e5e5e5; }
    .color-input input[type="text"] { border: none; font-family: ui-monospace, monospace; font-size: 14px; width: 100%; outline: none; }
    .traits { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .trait { font-size: 11px; padding: 4px 10px; border: 1px solid #e5e5e5; border-radius: 6px; color: #888; font-family: ui-monospace, monospace; }
    .view-toggle { display: flex; gap: 0; margin-bottom: 16px; width: 100%; }
    .view-tab { flex: 1; font-family: inherit; font-size: 13px; padding: 10px; border: 1px solid #ddd; background: #fff; color: #999; cursor: pointer; text-align: center; font-weight: 600; }
    .view-tab:first-child { border-radius: 8px 0 0 8px; }
    .view-tab:last-child { border-radius: 0 8px 8px 0; border-left: none; }
    .view-tab.active { background: #111; color: #fff; border-color: #111; }
    #asciiPreview { width: 100%; font-family: ui-monospace, monospace; font-size: 11px; line-height: 1.15; padding: 20px; border-radius: 8px; overflow-x: auto; white-space: pre; text-align: center; min-height: 280px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
    @media (max-width: 800px) { body { padding: 30px 20px; } .main { flex-direction: column; } .preview { flex: none; width: 100%; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Peenatars</h1>
    <a href="https://github.com/tut9492/peenatars" class="badge">GitHub</a>
    <span class="badge">v0.1.0</span>
    <p>Peenatars as SVGs. Generate unique peens from any seed string — Ethereum addresses, ENS names, emails, usernames. Deterministic, customizable, lightweight.</p>
  </div>
  <div class="main">
    <div class="preview">
      <div class="view-toggle">
        <button class="view-tab active" onclick="setView('svg',this)">SVG</button>
        <button class="view-tab" onclick="setView('ascii',this)">ASCII</button>
      </div>
      <div id="avatar"></div>
      <div id="asciiPreview" style="display:none"></div>
      <div class="preview-actions" id="svgActions">
        <button class="btn" onclick="copySVG()">Copy SVG</button>
        <button class="btn" onclick="copyDataUri()">Copy Data URI</button>
        <button class="btn btn-primary" onclick="downloadPNG()">Download PNG</button>
      </div>
      <div class="preview-actions" id="asciiActions" style="display:none">
        <button class="btn btn-primary" onclick="copyAscii()">Copy ASCII</button>
      </div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Seed</label>
        <input type="text" id="seed" value="visualizevalue" oninput="generate()">
        <div class="seed-chips">
          <span class="chip" onclick="setSeed('0x1234...abcd')">0x1234...abcd</span>
          <span class="chip" onclick="setSeed('vitalik.eth')">vitalik.eth</span>
          <span class="chip" onclick="setSeed('satoshi')">satoshi</span>
          <span class="chip" onclick="setSeed('breadio')">breadio</span>
          <span class="chip" onclick="setSeed('hello-world')">hello-world</span>
          <span class="chip" onclick="setSeed('Jack Butcher')">Jack Butcher</span>
        </div>
      </div>
      <div class="control-group">
        <label>Colors</label>
        <div class="color-presets">
          <span class="color-preset active" onclick="setColors('#000000','#ffffff',this)">Default</span>
          <span class="color-preset" onclick="setColors('#ffffff','#000000',this)">Inverted</span>
          <span class="color-preset" onclick="setColors('#1a5fb4','#daeaf6',this)">Blue</span>
          <span class="color-preset" onclick="setColors('#26a269','#daf5e7',this)">Green</span>
          <span class="color-preset" onclick="setColors('#813d9c','#f0daf5',this)">Purple</span>
          <span class="color-preset" onclick="setColors('#e5a50a','#fdf3d7',this)">Amber</span>
          <span class="color-preset" onclick="setColors('#f5c6aa','#8b4513',this)">Skin</span>
        </div>
        <div class="color-row">
          <div class="color-input">
            <div class="color-swatch" id="fgSwatch" style="background:#000"></div>
            <input type="text" id="fgColor" value="#000000" oninput="updateFromInputs()">
          </div>
          <div class="color-input">
            <div class="color-swatch" id="bgSwatch" style="background:#fff"></div>
            <input type="text" id="bgColor" value="#ffffff" oninput="updateFromInputs()">
          </div>
        </div>
      </div>
      <div class="control-group">
        <label>Traits</label>
        <div class="traits" id="traits"></div>
      </div>
    </div>
  </div>
